<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>CODE EXPLAINER</h1>
    <div class="container">
      <div class="input">
        <textarea placeholder="Code here"></textarea>
        <button id="clearbutton">CLEAR MY CODE</button>
      </div>
      <div class="explaining">
        <label for="range">Or select range of lines to explain:</label>
        Line Start:
        <input type="number" id="range-start" value="1" min="1" max="100000" />
        Line End:
        <input type="number" id="range-end" value="1" min="1" max="100000" />
        <label for="explanationlength">Choose an explanation length:</label>
        <select name="length" id="length">
          <option value="short">Short</option>
          <option value="medium">Medium</option>
          <option value="long">Long</option>
        </select>
        <button id="explainbutton">EXPLAIN MY CODE</button>
        <textarea placeholder="Here is the explanation..."></textarea>
        <button id="copybutton">COPY TO CLIPBOARD</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
