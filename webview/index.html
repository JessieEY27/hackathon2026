<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>CODE EXPLAINER</h1>
    <div class="container">
      <div class="input">
        <textarea placeholder="Paste your code here"></textarea>
        <button id="clearbutton">CLEAR MY CODE</button>
      </div>
      <div class="explaining">
        <button id="explainbutton">EXPLAIN MY CODE</button>
        <textarea placeholder="Here is the explanation..."></textarea>
        <button id="copybutton">COPY TO CLIPBOARD</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
