<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="explaining">
        <div class="theme-switch">
          <input type="checkbox" id="theme-toggle" />
          <label for="theme-toggle" class="switch"></label>
        </div>

        <h1>CODE EXPLAINER</h1>

        <label for="codeinput">Code to explain (read-only):</label>
        <textarea id="codeinput" readonly></textarea>
        <br>
        <label for="range-start">Or select range of lines to explain</label>
        <!-- <br> -->
        Line Start:
        <input type="number" id="range-start" value="1" min="1" max="100000" />

        Line End:
        <input type="number" id="range-end" value="1" min="1" max="100000" />
        <br>
        <button id="explainbutton">EXPLAIN MY CODE</button>
        <br>
        <button id="explainfilebutton">EXPLAIN THIS FILE</button>
        <br>

        <label for="length">Choose an explanation type:</label>
        <select name="length" id="length">
          <option value="short">Quick</option>
          <option value="medium">Standard</option>
          <option value="long">Detailed</option>
        </select>
        <br>
        <button id="eli5button">EXPLAIN LIKE I'M 5</button>
        <br>
        <textarea
          id="output"
          placeholder="The way the program works is..."
        ></textarea>
        <br>
        <button id="copybutton">COPY TO CLIPBOARD</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
